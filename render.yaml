services:
  - type: web
    name: hacienda-gonzalo-espinosa
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: AUTH_REQUIRED
        value: "1"
      - key: COOKIE_SECURE
        value: "1"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: comprobantes
      - key: BACKUP_DOWNLOAD_ENABLED
        value: "0"
      - key: CONSULTA_DOCUMENTS_ENABLED
        value: "0"
